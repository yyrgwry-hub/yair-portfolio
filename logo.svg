<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: code brackets with dot -->
  <g filter="url(#glow)">
    <!-- Left bracket -->
    <path d="M12 10 L4 20 L4 24 L12 34" stroke="#00ff88" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right bracket -->
    <path d="M28 10 L36 20 L36 24 L28 34" stroke="#00ff88" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Center dot -->
    <circle cx="20" cy="22" r="2.5" fill="#00ff88"/>
  </g>

  <!-- Divider line -->
  <line x1="50" y1="10" x2="50" y2="38" stroke="#00ff88" stroke-width="1" opacity="0.4"/>

  <!-- Name: Yair -->
  <text x="62" y="28" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" font-weight="700" fill="#caffdd" letter-spacing="1">Yair</text>

  <!-- Name: Guri (accent color) -->
  <text x="112" y="28" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" font-weight="700" fill="#00ff88" letter-spacing="1" filter="url(#glow)">Guri</text>

  <!-- Tagline -->
  <text x="62" y="43" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8" fill="#9aa4b2" letter-spacing="2">AI DEVELOPER</text>
</svg>
